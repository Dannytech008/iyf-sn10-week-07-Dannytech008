<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <link rel="stylesheet" href="do-do-list.css">
</head>
<body>

  <header>
    <h1 id="title">My To-Do List</h1>
  </header>

  <main>
    <section>
      <form id="taskForm">
        <label for="taskInput">New Task:</label>
        <input type="text" id="taskInput" placeholder="Enter task" required>
        <button type="submit">Add Task</button>
      </form>
    </section>

    <section>
      <h2>Tasks</h2>
      <div id="taskStats">
        <span>Active: <strong id="activeCount">0</strong></span>
        <span>Completed: <strong id="completedCount">0</strong></span>
        <span>Total: <strong id="totalCount">0</strong></span>
      </div>
      <ul id="taskList"></ul>
    </section>
  </main>

  <footer>
    <p>A To-Do App Designed by Wahome Daniel</p>
  </footer>

  <script src="DOM.js"></script>
  <script src="event-handling.js"></script>
</body>
</html>
